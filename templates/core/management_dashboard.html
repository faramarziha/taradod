{% extends "core/base_management.html" %}
{% block title %}داشبورد مدیریت{% endblock %}
{% block management_content %}
<h2 style="text-align:right;">
  <i class="fas fa-chart-bar" style="margin-left:0.5rem;"></i> داشبورد مدیریت
</h2>
<div class="dashboard-stats">
  <div class="dashboard-card">
    <h3>{{ total_users }}</h3>
    کل کاربران
  </div>
  <div class="dashboard-card">
    <h3>{{ today_logs }}</h3>
    تردد امروز
  </div>
  <div class="dashboard-card">
    <h3>{{ users_without_face }}</h3>
    بدون ثبت چهره
  </div>
</div>
<div style="margin-top:2rem;">
  <canvas id="logsChart" height="120"></canvas>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const logLabels = {{ date_range_json|safe }};
const logData = {{ daily_logs_json|safe }};
new Chart(document.getElementById('logsChart').getContext('2d'), {
  type: 'line',
  data: {
    labels: logLabels,
    datasets: [{
      label: 'تعداد تردد',
      data: logData,
      borderColor: '#3e95cd',
      fill: false
    }]
  },
  options: {scales: {y: {beginAtZero:true}}}
});
</script>
{% endblock %}
